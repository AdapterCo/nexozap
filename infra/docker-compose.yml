services:
  db:
    image: postgres:16-alpine
    container_name: nexozap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: nexozap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexozap"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexozap_internal

  redis:
    image: redis:7-alpine
    container_name: nexozap-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nexozap_internal

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: nexozap-api
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/nexozap?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${DOMAIN:-nexozap.adapterco.com.br}
      API_URL: api.${DOMAIN:-nexozap.adapterco.com.br}
      SESSIONS_DIR: /app/whatsapp-sessions
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - whatsapp_sessions:/app/whatsapp-sessions
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik9"
      - "traefik.http.routers.nexozap-api-http.rule=Host(`api.${DOMAIN:-nexozap.adapterco.com.br}`)"
      - "traefik.http.routers.nexozap-api-http.entrypoints=http"
      - "traefik.http.routers.nexozap-api-http.middlewares=https-redirect"
      - "traefik.http.routers.nexozap-api.rule=Host(`api.${DOMAIN:-nexozap.adapterco.com.br}`)"
      - "traefik.http.routers.nexozap-api.entrypoints=https"
      - "traefik.http.routers.nexozap-api.tls=true"
      - "traefik.http.routers.nexozap-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexozap-api.loadbalancer.server.port=3001"
    networks:
      - nexozap_internal
      - traefik9

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "https://api.${DOMAIN:-nexozap.adapterco.com.br}"
        INTERNAL_API_URL: "http://api:3001"
    container_name: nexozap-web
    restart: unless-stopped
    expose:
      - "3017"
    environment:
      PORT: "3017"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "https://api.${DOMAIN:-nexozap.adapterco.com.br}"
      INTERNAL_API_URL: "http://api:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3017/"]
      interval: 15s
      timeout: 5s
      retries: 10
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik9"
      - "traefik.http.routers.nexozap-web-http.rule=Host(`${DOMAIN:-nexozap.adapterco.com.br}`)"
      - "traefik.http.routers.nexozap-web-http.entrypoints=http"
      - "traefik.http.routers.nexozap-web-http.middlewares=https-redirect"
      - "traefik.http.routers.nexozap-web.rule=Host(`${DOMAIN:-nexozap.adapterco.com.br}`)"
      - "traefik.http.routers.nexozap-web.entrypoints=https"
      - "traefik.http.routers.nexozap-web.tls=true"
      - "traefik.http.routers.nexozap-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexozap-web.loadbalancer.server.port=3017"
    networks:
      - nexozap_internal
      - traefik9

  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/nexozap?schema=public
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - nexozap_internal

volumes:
  pgdata:
  redis_data:
  whatsapp_sessions:

networks:
  nexozap_internal:
    driver: bridge
  traefik9:
    external: true
