version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexozap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexozap
      POSTGRES_USER: nexozap
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexozap_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexozap

  redis:
    image: redis:7-alpine
    container_name: nexozap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nexozap

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: nexozap-api
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - nexozap
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.nexozap.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: nexozap-web
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - nexozap
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`nexozap.com`) || Host(`www.nexozap.com`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v3.0
    container_name: nexozap-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@nexozap.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - nexozap

volumes:
  postgres_data:
  traefik_certs:

networks:
  nexozap:
    driver: bridge
